<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lucky Draw — Admin</title>
  <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
  <div class="admin-layout">

    <header class="admin-header">
      <h1 class="admin-title">🎲 Lucky Draw Admin</h1>
      <a href="/" class="game-link" target="_blank">🎮 Open Game</a>
    </header>

    <!-- ── Participants ── -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Participants</h2>
        <span id="count-badge" class="count-badge">0 participants</span>
      </div>

      <table class="participant-table">
        <thead>
          <tr>
            <th>Emoji</th>
            <th>Name</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="participant-tbody"></tbody>
      </table>

      <!-- Add participant form -->
      <div class="add-form">
        <div class="add-form-title">Add Participant</div>

        <div class="selected-emoji-row">
          <span id="selected-emoji-display">😀</span>
          <span class="selected-label">Click an emoji below to select it</span>
        </div>

        <div id="emoji-picker" class="emoji-picker-grid"></div>

        <div class="name-row">
          <input type="text" id="participant-name" class="name-input"
                 placeholder="Enter participant name…" maxlength="30" autocomplete="off">
          <button id="add-participant-btn" class="add-btn">+ Add</button>
        </div>
      </div>
    </section>

    <!-- ── Round Settings ── -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Round Settings</h2>
      </div>

      <div class="settings-grid">
        <div class="setting-item">
          <label for="winners-count">Number of Winners</label>
          <input type="number" id="winners-count" class="number-input" min="1" max="20" value="3">
        </div>

        <div class="setting-item">
          <label>Ball Drop Speed</label>
          <div class="speed-options">
            <label class="speed-label">
              <input type="radio" name="speed" class="speed-radio" value="slow">
              🐢 Slow
            </label>
            <label class="speed-label">
              <input type="radio" name="speed" class="speed-radio" value="medium" checked>
              🚶 Medium
            </label>
            <label class="speed-label">
              <input type="radio" name="speed" class="speed-radio" value="fast">
              🚀 Fast
            </label>
          </div>
        </div>
      </div>

      <div class="save-row">
        <button id="save-config-btn" class="save-btn">Save Settings</button>
      </div>
    </section>

    <!-- ── Banner ── -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Banner</h2>
      </div>

      <!-- Mode selector -->
      <div class="banner-mode-row">
        <label class="banner-mode-label">
          <input type="radio" name="banner-type" class="banner-type-radio" value="none" checked>
          None
        </label>
        <label class="banner-mode-label">
          <input type="radio" name="banner-type" class="banner-type-radio" value="text">
          ✏ Text
        </label>
        <label class="banner-mode-label">
          <input type="radio" name="banner-type" class="banner-type-radio" value="image">
          🖼 Image
        </label>
      </div>

      <!-- Text panel -->
      <div id="banner-text-panel" class="banner-panel" style="display:none">
        <div class="setting-item">
          <label for="banner-text-input">Banner Text</label>
          <input type="text" id="banner-text-input" class="name-input"
                 placeholder="e.g. Welcome to Lucky Draw 2025!" maxlength="80" autocomplete="off">
          <div class="banner-char-count"><span id="banner-char-num">0</span>/80</div>
        </div>

        <div class="setting-item" style="margin-top:18px">
          <label>Style</label>
          <div class="banner-style-options">
            <label class="banner-style-card">
              <input type="radio" name="banner-style" class="banner-style-radio" value="elegant" checked>
              <span class="style-card-inner style-elegant-preview">Elegant</span>
            </label>
            <label class="banner-style-card">
              <input type="radio" name="banner-style" class="banner-style-radio" value="neon">
              <span class="style-card-inner style-neon-preview">Neon</span>
            </label>
            <label class="banner-style-card">
              <input type="radio" name="banner-style" class="banner-style-radio" value="festive">
              <span class="style-card-inner style-festive-preview">Festive</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Image panel -->
      <div id="banner-image-panel" class="banner-panel" style="display:none">
        <div id="banner-drop-zone" class="banner-drop-zone">
          <div class="drop-zone-inner">
            <span class="drop-zone-icon">🖼️</span>
            <span class="drop-zone-text">Drag & drop an image here, or click to browse</span>
            <span class="drop-zone-hint">JPEG · PNG · GIF · WebP · max 2 MB</span>
          </div>
          <input type="file" id="banner-file-input" accept="image/jpeg,image/png,image/gif,image/webp"
                 style="display:none">
        </div>
        <div id="banner-upload-error" class="banner-upload-error" style="display:none"></div>
      </div>

      <!-- Live preview -->
      <div id="banner-preview-area" class="banner-preview-area" style="display:none">
        <div class="add-form-title">Preview</div>
        <div id="banner-preview-box" class="banner-preview-box"></div>
      </div>

      <div class="save-row">
        <button id="save-banner-btn" class="save-btn">Save Banner</button>
      </div>
    </section>

  </div>

  <script src="/static/js/admin.js"></script>
</body>
</html>
